<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>最強ランキング</title>
    <style>
        body { font-family: sans-serif; max-width: 700px; margin: 0 auto; padding: 20px; }
        h1 { text-align: center; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background: #f5f5f5; }
        .rank { font-weight: bold; }
    </style>
</head>
<body>
    <h1>最強ランキング</h1>
    <table id="ranking">
        <thead><tr><th>順位</th><th>名前</th><th>スコア</th><th>モード</th><th>日付</th></tr></thead>
        <tbody></tbody>
    </table>
    <script>
        fetch('data/ranking.csv')
            .then(r => r.text())
            .then(csv => {
                const lines = csv.trim().split('\n').slice(1);
                const data = lines.map(line => {
                    const [name, score, mode, date] = line.split(',');
                    return { name, score: parseInt(score), mode, date };
                }).sort((a, b) => b.score - a.score);

                const tbody = document.querySelector('#ranking tbody');
                data.forEach((item, i) => {
                    tbody.innerHTML += `<tr><td class="rank">${i + 1}</td><td>${item.name}</td><td>${item.score}</td><td>${item.mode}</td><td>${item.date}</td></tr>`;
                });
            })
            .catch(() => {
                document.body.innerHTML += '<p style="color:red;text-align:center;">データの読み込みに失敗しました</p>';
            });
    </script>
</body>
</html>
